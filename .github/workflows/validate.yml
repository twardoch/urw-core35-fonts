name: validate-fonts

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Parse every font with fontTools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fontTools
        run: python -m pip install --upgrade "fonttools>=4.50"

      - name: Validate fonts
        run: python validate_fonts.py
